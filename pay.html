<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата — Голос на мільйон</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Onest', sans-serif;
      background: #F8FAFD;
      color: #0A1F4A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(10, 31, 74, 0.08);
      text-align: center;
    }

    .logo {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #1E5FE0;
      font-weight: 600;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7b99;
      margin-bottom: 24px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .price-old {
      font-size: 20px;
      color: #a0aec0;
      text-decoration: line-through;
    }

    .price {
      font-size: 40px;
      font-weight: 600;
      color: #1E5FE0;
    }

    .price-currency {
      font-size: 20px;
      font-weight: 400;
      color: #1E5FE0;
    }

    /* Email field */
    .email-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .email-label {
      font-size: 13px;
      font-weight: 500;
      color: #3a4d6e;
      margin-bottom: 6px;
      display: block;
    }

    .email-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #DCE9FB;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Onest', sans-serif;
      color: #0A1F4A;
      outline: none;
      transition: border-color 0.2s;
    }

    .email-input:focus {
      border-color: #1E5FE0;
      box-shadow: 0 0 0 3px rgba(30, 95, 224, 0.1);
    }

    .email-input::placeholder { color: #a0b4d4; }

    .email-input.invalid {
      border-color: #e53e3e;
      box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.1);
    }

    .email-hint {
      font-size: 12px;
      color: #6b7b99;
      margin-top: 6px;
    }

    .email-error {
      font-size: 12px;
      color: #e53e3e;
      margin-top: 6px;
      display: none;
    }

    /* Button */
    .pay-btn {
      display: block;
      width: 100%;
      padding: 18px 32px;
      background: #1E5FE0;
      color: #fff;
      border: none;
      border-radius: 60px;
      font-size: 17px;
      font-weight: 600;
      font-family: 'Onest', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .pay-btn:hover {
      background: #0F3FA8;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(30, 95, 224, 0.35);
    }

    .pay-btn:active { transform: translateY(0); }

    .pay-btn:disabled {
      background: #a0b4d4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .pay-btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .pay-btn.loading .btn-text { display: none; }
    .pay-btn.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff0f0;
      border: 1px solid #ffcdd2;
      border-radius: 10px;
      color: #c62828;
      font-size: 14px;
      display: none;
    }

    .secure {
      margin-top: 20px;
      font-size: 12px;
      color: #8a9ab5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .secure svg { width: 14px; height: 14px; fill: #8a9ab5; }

    .guarantee {
      margin-top: 16px;
      font-size: 12px;
      color: #8a9ab5;
      line-height: 1.5;
    }
  </style>
  <!-- Meta Pixel + CAPI: InitiateCheckout -->
  <script>
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '2104850950366655');
  fbq('track', 'PageView');
  var evId='ic_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
  fbq('track', 'InitiateCheckout', {value: 799, currency: 'UAH'}, {eventID: evId});
  function getCk(n){var m=document.cookie.match(new RegExp('(?:^|; )'+n+'=([^;]*)'));return m?decodeURIComponent(m[1]):null;}
  fetch('/.netlify/functions/meta-capi',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({event_name:'InitiateCheckout',event_id:evId,value:799,currency:'UAH',source_url:location.href,user_agent:navigator.userAgent,fbc:getCk('_fbc'),fbp:getCk('_fbp')})
  }).catch(function(){});
  </script>
  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=2104850950366655&ev=PageView&noscript=1"/></noscript>
  <!-- End Meta Pixel + CAPI -->
</head>
<body>

<div class="card">
  <div class="logo">Голос на мільйон</div>
  <h1>Оплата курсу</h1>
  <p class="subtitle">Наталка Денисенко · Онлайн-курс постановки голосу</p>

  <div class="price-row">
    <span class="price-old">2 890 ₴</span>
    <span class="price">799 <span class="price-currency">₴</span></span>
  </div>

  <div class="email-group">
    <label class="email-label" for="email">Ваш email</label>
    <input
      type="email"
      id="email"
      class="email-input"
      placeholder="email@example.com"
      autocomplete="email"
      inputmode="email"
      required
    >
    <p class="email-hint">На цю пошту прийде доступ до курсу та пароль</p>
    <p class="email-error" id="emailError">Введіть коректний email</p>
  </div>

  <button class="pay-btn" id="payBtn" onclick="createPayment()">
    <span class="btn-text">Оплатити 799 ₴</span>
    <div class="spinner"></div>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="secure">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
    Безпечна оплата з будь-якої карти світу через plata by mono
  </div>

  <p class="guarantee">Гарантія повернення коштів протягом 14 днів</p>
</div>

<script>
  // ============================================================
  //  КОНФІГУРАЦІЯ
  // ============================================================
  const CONFIG = {
    amount: 79900,                                   // 799 грн у копійках
    description: "Оплата курсу «Голос на мільйон»",
    redirectUrl: "https://golosnamillion.netlify.app/thank-you",  // → сторінка подяки з OTO
  };

  // ============================================================
  //  ВАЛІДАЦІЯ EMAIL
  // ============================================================
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  // Прибираємо червону рамку при введенні
  document.getElementById("email").addEventListener("input", function () {
    this.classList.remove("invalid");
    document.getElementById("emailError").style.display = "none";
  });

  // ============================================================
  //  СТВОРЕННЯ ПЛАТЕЖУ
  // ============================================================
  async function createPayment() {
    const btn = document.getElementById("payBtn");
    const errorEl = document.getElementById("errorMsg");
    const emailInput = document.getElementById("email");
    const emailError = document.getElementById("emailError");
    const email = emailInput.value.trim();

    // Валідуємо email
    if (!email || !isValidEmail(email)) {
      emailInput.classList.add("invalid");
      emailError.style.display = "block";
      emailInput.focus();
      return;
    }

    // UI: спінер
    btn.classList.add("loading");
    btn.disabled = true;
    errorEl.style.display = "none";

    try {
      const res = await fetch("/.netlify/functions/create-invoice", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          amount: CONFIG.amount,
          description: CONFIG.description,
          redirectUrl: CONFIG.redirectUrl,
          email: email,
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Помилка створення платежу");
      }

      // Зберігаємо дані для сторінки результату
      localStorage.setItem("mono_invoiceId", data.invoiceId);
      localStorage.setItem("mono_email", email);

      // Переходимо на Monobank
      window.location.href = data.pageUrl;

    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = "block";
      btn.classList.remove("loading");
      btn.disabled = false;
    }
  }

  // Enter на email → оплата
  document.getElementById("email").addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      createPayment();
    }
  });
</script>

</body>
</html>
